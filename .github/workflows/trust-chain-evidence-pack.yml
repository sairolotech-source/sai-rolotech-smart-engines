name: Trust Chain Evidence Pack

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "artifacts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tools/**"
      - ".github/workflows/**"

concurrency:
  group: trust-chain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trust-chain-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile

      - name: Build trust-chain evidence bundle
        shell: bash
        run: |
          set -euo pipefail
          pnpm trust-chain:bundle

      - name: Verify trust-chain output exists
        shell: bash
        run: |
          set -euo pipefail
          test -f artifacts/evidence/trust-chain/latest-run.txt
          RUN_ID=$(cat artifacts/evidence/trust-chain/latest-run.txt)
          test -d artifacts/evidence/trust-chain/$RUN_ID
          test -f artifacts/evidence/trust-chain/$RUN_ID/artifact_manifest.json

      - name: Resolve run id
        id: runid
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID=$(cat artifacts/evidence/trust-chain/latest-run.txt)
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Upload immutable trust-chain artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trust-chain-${{ github.sha }}-${{ steps.runid.outputs.run_id }}
          path: artifacts/evidence/trust-chain/${{ steps.runid.outputs.run_id }}
          if-no-files-found: error
          retention-days: 90

      - name: Publish job summary
        shell: bash
        run: |
          set -euo pipefail
          echo "## Trust Chain Evidence Pack" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: $GITHUB_SHA" >> $GITHUB_STEP_SUMMARY
          echo "- Run ID: ${{ steps.runid.outputs.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- Artifact: trust-chain-${{ github.sha }}-${{ steps.runid.outputs.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- Retention: 90 days" >> $GITHUB_STEP_SUMMARY
